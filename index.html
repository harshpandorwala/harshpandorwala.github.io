<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harsh Pandorwala</title>
<meta name="description" content="Guiding individuals and teams to elevate every single day through movement, breathwork, and mindset.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    /* DARK sections: charcoal bg, sky text, earth green accent */
    --dark:       #1C1C1A;
    --dark-soft:  #252523;
    --sky:        #E6F1FB;
    --sky-dim:    #a8c4e0;
    --earth:      #C0DD97;

    /* LIGHT sections: sky bg or white bg, charcoal text, water blue accent */
    --water:      #378ADD;
    --water-deep: #185FA5;
    --charcoal:   #1C1C1A;
    --grey:       #6a7a8a;

    --serif: 'Cormorant Garamond', serif;
    --sans:  'DM Sans', sans-serif;
  }

  html, body { height: 100%; font-family: var(--sans); background: var(--sky); color: var(--charcoal); overflow-x: hidden; }

  /* HERO — dark section */
  .hero { min-height: 100vh; display: grid; grid-template-columns: 1fr 1fr; background: var(--dark); }

  .hero-left { display: flex; flex-direction: column; justify-content: space-between; padding: 64px 64px 52px 72px; }

  .hero-name { font-family: var(--serif); font-size: 22px; font-weight: 400; color: #ffffff; letter-spacing: 0.5px; }

  .hero-center { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 48px 0; }

  .hero-headline { font-family: var(--serif); font-size: 76px; line-height: 1.0; font-weight: 300; color: var(--white, #ffffff); margin-bottom: 28px; }
  .hero-headline em { font-style: italic; color: var(--sky-dim); }

  .hero-sub { font-size: 14px; line-height: 1.9; color: rgba(255,255,255,0.85); max-width: 340px; margin-bottom: 48px; font-weight: 300; }

  .hero-btns { display: flex; flex-direction: column; gap: 12px; max-width: 260px; }

  /* Dark section buttons */
  .btn-dark-primary {
    background: var(--earth); color: var(--dark);
    border: none; padding: 15px 24px;
    font-family: var(--sans); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; border-radius: 4px; text-decoration: none;
    display: block; text-align: center; transition: background 0.2s, color 0.2s; font-weight: 500;
  }
  .btn-dark-primary:hover { background: #ffffff; color: var(--dark); }

  .btn-dark-secondary {
    background: transparent; color: var(--sky-dim);
    border: 1px solid rgba(230, 241, 251, 0.25);
    padding: 15px 24px; font-family: var(--sans); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; border-radius: 4px; text-decoration: none;
    display: block; text-align: center; transition: all 0.2s; font-weight: 300;
  }
  .btn-dark-secondary:hover { border-color: rgba(230, 241, 251, 0.5); background: rgba(230, 241, 251, 0.05); }

  .hero-bottom { display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }

  .contact-link {
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--sky-dim); text-decoration: none; font-weight: 400;
    border-bottom: 1px solid rgba(168, 196, 224, 0.3); padding-bottom: 2px; transition: color 0.2s;
  }
  .contact-link:hover { color: #ffffff; }

  .divider { width: 1px; height: 14px; background: rgba(230, 241, 251, 0.15); }

  .social-links { display: flex; gap: 20px; align-items: center; }
  .social-link { font-size: 11px; letter-spacing: 1px; color: var(--sky-dim); text-decoration: none; transition: color 0.2s; font-weight: 300; }
  .social-link:hover { color: var(--sky); }

  /* RIGHT — photo fills height */
  .hero-right { position: relative; overflow: hidden; background: var(--dark-soft); }
  .hero-right img { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; }
  .photo-placeholder { width: 100%; height: 100%; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .photo-placeholder p { font-size: 11px; letter-spacing: 2px; color: rgba(230,241,251,0.3); text-transform: uppercase; }

  @media (max-width: 768px) {
    .hero { grid-template-columns: 1fr; min-height: auto; }
    .hero-left { padding: 40px 28px 36px; }
    .hero-headline { font-size: 52px; }
    .hero-right { height: 100vw; min-height: 400px; }
    .photo-placeholder { min-height: 400px; }
    .hero-bottom { flex-direction: column; align-items: flex-start; gap: 14px; }
    .divider { display: none; }
    .social-links { flex-wrap: wrap; gap: 14px; }
  }
</style>
</head>
<body>
<div class="hero">
  <div class="hero-left">
    <div class="hero-name">Harsh Pandorwala</div>
    <div class="hero-center">
      <h1 class="hero-headline">Elevate<br>every<br><em>single day.</em></h1>
      <p class="hero-sub">Guiding individuals and teams to build the daily habits that transform the body, sharpen the mind, and ground the spirit.</p>
      <div class="hero-btns">
        <a href="teams.html" class="btn-dark-primary">For Teams</a>
        <a href="https://tally.so/r/rjdAjN" target="_blank" class="btn-dark-secondary">1:1 Coaching</a>
      </div>
    </div>
    <div class="hero-bottom">
      <a href="mailto:harsh@harshpandorwala.com" class="contact-link">Get in touch</a>
      <div class="divider"></div>
      <div class="social-links">
        <a href="https://www.instagram.com/harshpandorwala/" target="_blank" class="social-link">Instagram</a>
        <a href="https://www.linkedin.com/in/harshpandorwala/" target="_blank" class="social-link">LinkedIn</a>
        <a href="https://www.youtube.com/@harshpandorwala" target="_blank" class="social-link">YouTube</a>
      </div>
    </div>
  </div>
  <div class="hero-right">
    <img src="images/harsh-photo.jpg" alt="Harsh Pandorwala" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
    <div class="photo-placeholder" style="display:none;"><p>Your photo here</p></div>
  </div>
</div>
</body>
</html>
